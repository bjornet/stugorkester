name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (prettier + eslint)
        run: bun run lint

      - name: Typecheck (svelte-check)
        run: bun run check

      - name: Test (vitest)
        run: bun run test

      - name: Build
        run: bun run build
